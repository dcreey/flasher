name: Flasher
options:
  bundleIdPrefix: com.dcreey
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""
targets:
  Flasher:
    type: application
    platform: iOS
    sources:
      - path: Flasher
    info:
      path: Flasher/Info.plist
      properties:
        CFBundleDisplayName: Flasher
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
